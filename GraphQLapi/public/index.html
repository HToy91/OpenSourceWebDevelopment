<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GraphQL Client</title>
</head>
<body>
    <h2>Users</h2>

    <div id="users">Loading...</div>

    <script>
        const endPoint = "/graphql";

        async function graphqlRequest(query, variables = {}) {
            const res = await fetch(endPoint, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({query, variables})
            });
            return res.json();
        }

        async function loadUsers() {
            const query = `query {
                users {
                    id
                    name
                    email
                }
            }`;

            // Send the GraphQL query to the server
            const req = await graphqlRequest(query);
            // Extract the users from the response
            const users = (req.data && req.data.users) || [];
            // Display the users in the page
            document.getElementById("users").innerHTML = users.length?
                `<ul>${users.map(user => `<li>${user.id}: ${user.name} (${user.email}, ${user.age})</li>`).join("")}</ul>`: "<em>no users found</em>";
        }

        loadUsers();
    </script>
</body>
</html>
