<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Database</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <h1>Add Employee</h1>

    <section class="card">
        <section class="card">
            <form action="" method="POST" id="add-employee-form">

                <div class="form-row">
                    <label for="firstName">First Name:</label>
                    <input type="text" id="firstName" name="firstName" required>
                </div>

                <div class="form-row">
                    <label for="lastName">Last Name:</label>
                    <input type="text" id="lastName" name="lastName" required>
                </div>

                <div class="form-row">
                    <label for="department">Department:</label>
                    <input type="text" id="department" name="department" required>
                </div>

                <div class="form-row">
                    <label for="startDate">Start Date:</label>
                    <input type="date" id="startDate" name="startDate" required>
                </div>

                <div class="form-row">
                    <label for="jobTitle">Job Title:</label>
                    <input type="text" id="jobTitle" name="jobTitle" required>
                </div>

                <div class="form-row">
                    <label for="salary">Salary:</label>
                    <input type="number" id="salary" name="salary" step="0.01" required>
                </div>

                <button type="submit" class="form-button">Add Employee</button>

            </form>
        </section>

    </section>

    <h2>Employees</h2>

    <section class="card">
        <table>
            <thead>
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Department</th>
                    <th>Start Date</th>
                    <th>Job Title</th>
                    <th>Salary</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="employees"></tbody>
        </table>

        <h2 id="employee-deleted"></h2>

    </section>

    <script>
        // The endpoint for our GraphQL API
        const endPoint = "/graphql";

        // A helper function to send GraphQL requests
        async function graphqlRequest(query, variables ={}) {
            const res = await fetch(endPoint, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({query, variables})
             });
             return res.json();
        }

        document.getElementById("add-employee-form")
            .addEventListener("submit", addEmployee);

        async function loadEmployees() {
            const query = `query {
                employees {
                    id
                    firstName
                    lastName
                    department
                    startDate
                    jobTitle
                    salary
                }
           }`;

            // Send the GraphQL query to the server
            const req = await graphqlRequest(query);
            // Extract the employees from the response
            const employees = (req.data && req.data.employees) || [];
            // Display the employees in the page
            document.getElementById("employees").innerHTML = employees.length?
                `${employees.map(emp => `
                    <tr>
                        <td>${emp.firstName}</td>
                        <td>${emp.lastName}</td>
                        <td>${emp.department}</td>
                        <td>${formatDate(emp.startDate)}</td>
                        <td>${emp.jobTitle}</td>
                        <td>$ ${emp.salary.toFixed(2)}</td>
                        <td>
                        <button onclick="updateEmployee('${emp.id}')">Edit</button>

                        <button onclick="deleteEmployee('${emp.id}')">Delete</button>
                        </td>
                    </tr>`).join("")}`: "<em>No employees found</em>";
        }

        async function deleteEmployee(id) {
            const mutation =  `mutation ($id: ID!) {
                deleteEmployee(id: $id)
            }`;

            const req = await graphqlRequest(mutation, {id});
                if (req.data && req.data.deleteEmployee) {
                    var emp_deleted = document.getElementById("employee-deleted")
                    emp_deleted.textContent = `${req.data.deleteEmployee}!`;
                    // alert(req.data.deleteEmployee);
                    await loadEmployees();
                } else {
                    alert("Failed to delete employee");
                }
        }

        function formatDate(dateString) {
            return new Date(dateString).toISOString().split("T")[0];
        }

        async function addEmployee(e) {
            e.preventDefault();

            const form = document.getElementById("add-employee-form");

            // To prevent injection, I used parameterized queries with variables instead of string interpolation for the mutation. This way, the user input is treated as data rather than executable code, which helps prevent injection attacks. (thanks software security)
            const mutation = `mutation ($firstName: String!, $lastName: String!, $department: String!, $startDate: String!, $jobTitle: String!, $salary: Float!) {
                addEmployee(
                    firstName: $firstName,
                    lastName: $lastName,
                    department: $department,
                    startDate: $startDate,
                    jobTitle: $jobTitle,
                    salary: $salary
                ) {
                    id
                    firstName
                    lastName
                    department
                    startDate
                    jobTitle
                    salary
                  }
            }`;

            const variables = {
                firstName: form.firstName.value.trim(),
                lastName: form.lastName.value.trim(),
                department: form.department.value.trim(),
                startDate: form.startDate.value,          // "YYYY-MM-DD"
                jobTitle: form.jobTitle.value.trim(),
                salary: parseFloat(form.salary.value)
            };

            const req = await graphqlRequest(mutation, variables);

            if (req.data && req.data.addEmployee) {
                alert(`Employee ${req.data.addEmployee.firstName} ${req.data.addEmployee.lastName} added successfully!`);
                form.reset();
                await loadEmployees();
            } else {
                alert("Failed to add employee");
            }

            var emp_deleted = document.getElementById("employee-deleted");
            emp_deleted.textContent = "";
        }

        async function updateEmployee(id) {
            const query = `query {
                employees {
                  id
                  firstName
                  lastName
                  department
                  startDate
                  jobTitle
                  salary
                }
              }`;

            const req = await graphqlRequest(query);
            const employees = (req.data && req.data.employees) || [];
            // Find the employee to edit
            const emp = employees.find(e => e.id === id);

            if (!emp) {
                alert("Employee not found");
                return;
            }

            // Fill form
            document.getElementById("firstName").value = emp.firstName;
            document.getElementById("lastName").value = emp.lastName;
            document.getElementById("department").value = emp.department;
            document.getElementById("startDate").value = formatDate(emp.startDate);
            document.getElementById("jobTitle").value = emp.jobTitle;
            document.getElementById("salary").value = emp.salary.toFixed(2);

            const saveButton = document.querySelector(".form-button");
            saveButton.textContent = "Save Changes";

            saveButton.onclick = async function (e) {
                // Prevent the form from submitting normally
                e.preventDefault();

                const mutation = `mutation ($id: ID!, $firstName: String!, $lastName: String!, $department: String!, $startDate: String!, $jobTitle: String!, $salary: Float!) {
                    updateEmployee(
                        id: $id,
                        firstName: $firstName,
                        lastName: $lastName,
                        department: $department,
                        startDate: $startDate,
                        jobTitle: $jobTitle,
                        salary: $salary
                    ) {
                        id
                        firstName
                        lastName
                        department
                        startDate
                        jobTitle
                        salary
                      }
                }`;

                const variables = {
                    id,
                    firstName: document.getElementById("firstName").value,
                    lastName: document.getElementById("lastName").value,
                    department: document.getElementById("department").value,
                    startDate: document.getElementById("startDate").value,
                    jobTitle: document.getElementById("jobTitle").value,
                    salary: parseFloat(document.getElementById("salary").value)
                };

                const res = await graphqlRequest(mutation, variables);

                if (res.data && res.data.updateEmployee) {
                    alert("Employee updated!");
                    saveButton.textContent = "Add Employee";
                    saveButton.onclick = addEmployee;
                    document.getElementById("add-employee-form").reset();
                    await loadEmployees();
                } else {
                    alert("Failed to update employee");
                }
            };
        }

        loadEmployees();
    </script>
</body>
</html>
